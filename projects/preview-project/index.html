g-bottom:6px;padding-left:20px;position:relative;}.card-features li::before{content:"✓";position:absolute;left:0px;color:rgb(76, 175, 80);font-weight:bold;}.carousel-card.orange .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(243, 156, 18);}.carousel-card.pink .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(233, 30, 99);}.carousel-card.purple .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(155, 89, 182);}.carousel-card img{width:100%;height:180px;object-fit:cover;}.orange .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(232, 137, 26);}.pink .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(192, 23, 94);}.purple .card-header{background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(139, 63, 168);}.card img{width:100%;height:200px;object-fit:cover;}.carousel-nav button{width:50px;height:50px;border-top-left-radius:50%;border-top-right-radius:50%;border-bottom-right-radius:50%;border-bottom-left-radius:50%;border-top-width:2px;border-right-width:2px;border-bottom-width:2px;border-left-width:2px;border-top-style:solid;border-right-style:solid;border-bottom-style:solid;border-left-style:solid;border-top-color:rgb(51, 51, 51);border-right-color:rgb(51, 51, 51);border-bottom-color:rgb(51, 51, 51);border-left-color:rgb(51, 51, 51);border-image-source:initial;border-image-slice:initial;border-image-width:initial;border-image-outset:initial;border-image-repeat:initial;background-image:initial;background-position-x:initial;background-position-y:initial;background-size:initial;background-repeat:initial;background-attachment:initial;background-origin:initial;background-clip:initial;background-color:rgb(255, 255, 255);cursor:pointer;font-size:20px;line-height:1;}.carousel-card:hover .card-image{transform:scale(1.05);}.card-body p{font-size:14px;color:rgb(85, 85, 85);line-height:1.6;margin-top:0px;margin-right:0px;margin-bottom:16px;margin-left:0px;}.card-body ul{list-style-position:initial;list-style-image:initial;list-style-type:none;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-top:10px;margin-right:0px;margin-bottom:0px;margin-left:0px;font-size:13px;color:rgb(102, 102, 102);}.card-body li{padding-top:6px;padding-right:0px;padding-bottom:6px;padding-left:18px;position:relative;}.card-body li::before{content:"•";position:absolute;left:0px;color:rgb(51, 51, 51);font-weight:bold;}.card > div, .card img{width:100%;}*{box-sizing:border-box;}.card-inner img{width:100%;height:200px;object-fit:cover;display:block;}.card-body ul li::before{content:"• ";}.orange .card-inner{border-top-color:rgb(232, 137, 26);border-right-color:rgb(232, 137, 26);border-bottom-color:rgb(232, 137, 26);border-left-color:rgb(232, 137, 26);}.pink .card-inner{border-top-color:rgb(192, 23, 94);border-right-color:rgb(192, 23, 94);border-bottom-color:rgb(192, 23, 94);border-left-color:rgb(192, 23, 94);}.purple .card-inner{border-top-color:rgb(139, 63, 168);border-right-color:rgb(139, 63, 168);border-bottom-color:rgb(139, 63, 168);border-left-color:rgb(139, 63, 168);}.form-group-sfmc label{font-size:13px;font-weight:600;color:rgb(68, 68, 68);}.checkbox-group label{font-weight:400;font-size:12px;color:rgb(102, 102, 102);cursor:pointer;}@keyframes slideIn{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0px);}}@media (max-width: 768px){.nav-links-list{row-gap:20px;column-gap:20px;}.nav-item{font-size:13px;}.programme-list li{font-size:17px;row-gap:12px;column-gap:12px;margin-bottom:20px;line-height:1.45;}.card img{height:180px;}}</style>

    <body id="iulk"><header class="header-brassart"><header class="header-efap"><div class="header-container"><img src="../../assets/efap-logo.png" alt="EFAP Logo" class="efap-logo-img"/><button class="btn-en-minimal">EN</button></div></header><header class="header-brassart"><div class="header-container"><div class="logo-tagline"><img src="../../assets/brassart-logo.png" alt="BRASSART Logo" class="brassart-logo-img"/><div class="header-tagline-text">L'école des métiers<br/>de la création</div></div></div></header></header><nav class="horizontal-nav-bar"><div class="nav-scroll-container"><ul class="nav-links-list"><li><a href="#section-brassart" class="nav-item">POURQUOI BRASSART</a></li><li><a href="#section-programmes" class="nav-item">PROGRAMMES</a></li><li><a href="#section-metiers" class="nav-item">MÉTIERS</a></li><li><a href="#section-insertion" class="nav-item">INSERTION PROFESSIONNELLE</a></li><li><a href="#section-reconnaissance" class="nav-item">RECONNAISSANCE</a></li><li><a href="#section-pedagogie" class="nav-item">PÉDAGOGIE</a></li><li><a href="#section-international" class="nav-item">INTERNATIONAL</a></li><li><a href="#section-evenements" class="nav-item">ÉVÉNEMENTS</a></li><li><a href="#section-campus" class="nav-item">CAMPUS</a></li><li><a href="#section-admission" class="nav-item">ADMISSION</a></li><li><a href="#section-faq" class="nav-item">FOIRE AUX QUESTIONS</a></li></ul></div></nav><figure class="img-caption-block"></figure><div id="iy55b"></div><div id="ika8h"></div></body><script>var props = {"iy55b":{},"ika8h":{}};
          var ids = Object.keys(props).map(function(id) { return '#'+id }).join(',');
          var els = document.querySelectorAll(ids);
          for (var i = 0, len = els.length; i < len; i++) {
            var el = els[i];
            (function () {
                    const el        = this;
                    const track     = el.querySelector('.carrous-track');
                    const nextBtn   = el.querySelector('.carrous-next');
                    const prevBtn   = el.querySelector('.carrous-prev');
                    let index       = 0;

                    function getVisible() {
                        if (window.innerWidth <= 580)  return 1;
                        if (window.innerWidth <= 1024) return 2;
                        return 3;
                    }

                    function update() {
                        const visible   = getVisible();
                        const cardWidth = track.firstElementChild.offsetWidth;
                        const maxIndex  = track.children.length - visible;

                        index = Math.min(Math.max(index, 0), maxIndex);
                        track.style.transform = `translateX(-${index * cardWidth}px)`;
                    }

                    nextBtn.addEventListener('click', () => {
                        const visible = getVisible();
                        index = (index < track.children.length - visible) ? index + 1 : 0;
                        update();
                    });

                    prevBtn.addEventListener('click', () => {
                        const visible = getVisible();
                        index = (index > 0) ? index - 1 : track.children.length - visible;
                        update();
                    });

                    window.addEventListener('resize', update);
                    update();
                }.bind(el))(props[el.id]);
          }</script>
